<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hove Math</title>
    <style>
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        nav { background: #1e1e1e; padding: 15px; border-bottom: 2px solid #00ffcc; text-align: center; }
        #game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #252525; padding: 20px; border-radius: 10px; cursor: pointer; border: 1px solid #333; transition: 0.3s; }
        .card:hover { border-color: #00ffcc; transform: translateY(-5px); }
        #hovey-ai { position: fixed; bottom: 20px; right: 20px; width: 220px; background: #1e1e1e; border: 2px solid #00ffcc; border-radius: 15px; padding: 15px; box-shadow: 0 0 15px rgba(0,255,204,0.3); }
        .h-icon { font-size: 40px; color: #00ffcc; font-family: serif; text-align: center; }
        #chat-box { font-size: 13px; height: 60px; margin: 10px 0; overflow-y: auto; color: #ccc; }
        input { width: 100%; background: #000; border: 1px solid #444; color: white; padding: 5px; border-radius: 5px; }
        iframe { width: 100%; height: 90vh; border: none; }
    </style>
</head>
<body>

<nav><h1>HOVE MATH</h1></nav>

<div id="main-content">
    <div id="game-grid">
        <div class="card" onclick="play('https://www.google.com/logos/2010/pacman10-i.html')"><h3>Pacman</h3><p>Click to Play</p></div>
        <div class="card" onclick="play('https://poki.com')"><h3>More Games</h3><p>Click to Play</p></div>
    </div>
</div>

<div id="hovey-ai">
    <div class="h-icon">ℋ</div>
    <div id="chat-box">Hovey: Welcome! I'm your fancy assistant. Need a "math" break?</div>
    <input type="text" id="user-in" placeholder="Ask Hovey..." onkeypress="chat(event)">
</div>

<script>
    function play(url) {
        document.getElementById('main-content').innerHTML = `<iframe src="${url}"></iframe><button onclick="location.reload()" style="position:fixed;top:10px;left:10px;padding:10px;background:#00ffcc;border:none;cursor:pointer;border-radius:5px;">Back</button>`;
    }

    function chat(e) {
        if(e.key === 'Enter') {
            const box = document.getElementById('chat-box');
            const input = document.getElementById('user-in');
            box.innerHTML = "You: " + input.value;
            setTimeout(() => {
                box.innerHTML = "Hovey: That sounds sophisticated! Shall we play a game?";
            }, 800);
            input.value = "";
        }
    }
</script>

</body>
</html>
